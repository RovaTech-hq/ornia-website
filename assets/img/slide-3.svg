<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050f0e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#071a19;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020a09;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)" />

  <!-- Center glow blob -->
  <ellipse cx="960" cy="540" rx="600" ry="400" fill="url(#centerGlow)" />

  <!-- Grid lines (horizontal) -->
  <g stroke="#0d9488" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="135" x2="1920" y2="135"/>
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="405" x2="1920" y2="405"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="675" x2="1920" y2="675"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="0" y1="945" x2="1920" y2="945"/>
  </g>
  <!-- Grid lines (vertical) -->
  <g stroke="#0d9488" stroke-opacity="0.06" stroke-width="1">
    <line x1="192" y1="0" x2="192" y2="1080"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="576" y1="0" x2="576" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1344" y1="0" x2="1344" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
    <line x1="1728" y1="0" x2="1728" y2="1080"/>
  </g>

  <!-- ECG waveform across the middle -->
  <polyline
    points="0,540 120,540 160,540 180,500 200,540 220,460 240,620 260,390 280,540 300,540 420,540 440,540 460,500 480,540 500,460 520,620 540,390 560,540 580,540 700,540 720,540 740,500 760,540 780,460 800,620 820,390 840,540 860,540 980,540 1000,540 1020,500 1040,540 1060,460 1080,620 1100,390 1120,540 1140,540 1260,540 1280,540 1300,500 1320,540 1340,460 1360,620 1380,390 1400,540 1420,540 1540,540 1560,540 1580,500 1600,540 1620,460 1640,620 1660,390 1680,540 1700,540 1920,540"
    fill="none"
    stroke="url(#tealGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Ankle device silhouette (centered, abstract) -->
  <g transform="translate(960,430)" filter="url(#softGlow)">
    <!-- Ankle band ring -->
    <ellipse cx="0" cy="80" rx="110" ry="38" fill="none" stroke="#0d9488" stroke-width="18" stroke-opacity="0.9"/>
    <!-- Band clasp / module -->
    <rect x="-42" y="54" width="84" height="52" rx="16" fill="#0d9488" fill-opacity="0.2" stroke="#0d9488" stroke-width="2.5"/>
    <!-- Sensor dots on module -->
    <circle cx="-18" cy="80" r="5" fill="#0d9488" fill-opacity="0.9"/>
    <circle cx="0" cy="80" r="5" fill="#0d9488" fill-opacity="0.9"/>
    <circle cx="18" cy="80" r="5" fill="#0d9488" fill-opacity="0.9"/>
    <!-- Signal arcs above device -->
    <path d="M -55,-10 Q 0,-50 55,-10" fill="none" stroke="#0d9488" stroke-width="2" stroke-opacity="0.5"/>
    <path d="M -38,-20 Q 0,-55 38,-20" fill="none" stroke="#0d9488" stroke-width="2" stroke-opacity="0.35"/>
    <path d="M -20,-30 Q 0,-60 20,-30" fill="none" stroke="#0d9488" stroke-width="2" stroke-opacity="0.2"/>
    <!-- Pulse dot at apex -->
    <circle cx="0" cy="-62" r="5" fill="#0d9488" fill-opacity="0.8"/>
    <circle cx="0" cy="-62" r="12" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle cx="0" cy="-62" r="22" fill="none" stroke="#0d9488" stroke-width="1" stroke-opacity="0.2"/>
  </g>

  <!-- Vital stat chips around device -->
  <!-- SpO2 chip - left -->
  <g transform="translate(680,370)">
    <rect x="0" y="0" width="150" height="56" rx="12" fill="#0d9488" fill-opacity="0.1" stroke="#0d9488" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="14" y="20" font-family="ui-monospace,monospace" font-size="9" fill="#0d9488" fill-opacity="0.7" letter-spacing="1.5">BLOOD OXYGEN</text>
    <text x="14" y="44" font-family="ui-monospace,monospace" font-size="22" font-weight="700" fill="#0d9488">98%</text>
  </g>
  <!-- HR chip - right -->
  <g transform="translate(1090,370)">
    <rect x="0" y="0" width="150" height="56" rx="12" fill="#0d9488" fill-opacity="0.1" stroke="#0d9488" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="14" y="20" font-family="ui-monospace,monospace" font-size="9" fill="#0d9488" fill-opacity="0.7" letter-spacing="1.5">HEART RATE</text>
    <text x="14" y="44" font-family="ui-monospace,monospace" font-size="22" font-weight="700" fill="#0d9488">126 bpm</text>
  </g>
  <!-- Temp chip - bottom left -->
  <g transform="translate(700,580)">
    <rect x="0" y="0" width="140" height="56" rx="12" fill="#0d9488" fill-opacity="0.1" stroke="#0d9488" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="14" y="20" font-family="ui-monospace,monospace" font-size="9" fill="#0d9488" fill-opacity="0.7" letter-spacing="1.5">SKIN TEMP</text>
    <text x="14" y="44" font-family="ui-monospace,monospace" font-size="22" font-weight="700" fill="#0d9488">36.8°C</text>
  </g>
  <!-- RR chip - bottom right -->
  <g transform="translate(1080,580)">
    <rect x="0" y="0" width="160" height="56" rx="12" fill="#0d9488" fill-opacity="0.1" stroke="#0d9488" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="14" y="20" font-family="ui-monospace,monospace" font-size="9" fill="#0d9488" fill-opacity="0.7" letter-spacing="1.5">BREATHS / MIN</text>
    <text x="14" y="44" font-family="ui-monospace,monospace" font-size="22" font-weight="700" fill="#0d9488">36 /min</text>
  </g>

  <!-- LIVE badge top right of device area -->
  <g transform="translate(1020,310)">
    <rect x="0" y="0" width="72" height="26" rx="13" fill="#0d9488" fill-opacity="0.15" stroke="#0d9488" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="16" cy="13" r="4" fill="#0d9488"/>
    <text x="26" y="17.5" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#0d9488" letter-spacing="1.5">LIVE</text>
  </g>

  <!-- MALUEL wordmark bottom centre -->
  <text
    x="960" y="830"
    font-family="ui-sans-serif,system-ui,sans-serif"
    font-size="72"
    font-weight="800"
    letter-spacing="-2"
    text-anchor="middle"
    fill="white"
    fill-opacity="0.06"
  >MALUEL</text>

  <!-- Tagline -->
  <text
    x="960" y="870"
    font-family="ui-sans-serif,system-ui,sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="4"
    text-anchor="middle"
    fill="#0d9488"
    fill-opacity="0.45"
  >INTELLIGENT INFANT GUARDIAN · 11 PATENTS</text>

  <!-- Decorative dots grid (bottom left) -->
  <g fill="#0d9488" fill-opacity="0.12">
    <circle cx="160" cy="820" r="2.5"/><circle cx="200" cy="820" r="2.5"/><circle cx="240" cy="820" r="2.5"/><circle cx="280" cy="820" r="2.5"/>
    <circle cx="160" cy="860" r="2.5"/><circle cx="200" cy="860" r="2.5"/><circle cx="240" cy="860" r="2.5"/><circle cx="280" cy="860" r="2.5"/>
    <circle cx="160" cy="900" r="2.5"/><circle cx="200" cy="900" r="2.5"/><circle cx="240" cy="900" r="2.5"/><circle cx="280" cy="900" r="2.5"/>
    <circle cx="160" cy="940" r="2.5"/><circle cx="200" cy="940" r="2.5"/><circle cx="240" cy="940" r="2.5"/><circle cx="280" cy="940" r="2.5"/>
  </g>
  <!-- Decorative dots grid (top right) -->
  <g fill="#0d9488" fill-opacity="0.12">
    <circle cx="1640" cy="140" r="2.5"/><circle cx="1680" cy="140" r="2.5"/><circle cx="1720" cy="140" r="2.5"/><circle cx="1760" cy="140" r="2.5"/>
    <circle cx="1640" cy="180" r="2.5"/><circle cx="1680" cy="180" r="2.5"/><circle cx="1720" cy="180" r="2.5"/><circle cx="1760" cy="180" r="2.5"/>
    <circle cx="1640" cy="220" r="2.5"/><circle cx="1680" cy="220" r="2.5"/><circle cx="1720" cy="220" r="2.5"/><circle cx="1760" cy="220" r="2.5"/>
  </g>

  <!-- Corner accent lines -->
  <g stroke="#0d9488" stroke-opacity="0.2" stroke-width="1.5" fill="none">
    <path d="M 60,60 L 60,120 L 120,120"/>
    <path d="M 1860,60 L 1860,120 L 1800,120"/>
    <path d="M 60,1020 L 60,960 L 120,960"/>
    <path d="M 1860,1020 L 1860,960 L 1800,960"/>
  </g>
</svg>
